<style>
:root {
  --sf:#185fa5; --al:#534ab7; --la:#ba7517; --yo:#3b6d11; --fly:#5f5e5a;
  --bg:#f8f7f4; --card:#fff; --border:#e8e6df; --text:#1a1a18; --muted:#6b6a63;
  --radius:12px; --topbar-h:108px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family: -apple-system, system-ui, sans-serif; background:var(--bg); color:var(--text); font-size:15px; }

/* ── TOPBAR ── */
#topbar {
  background:#fff; border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:200;
  padding: env(safe-area-inset-top, 12px) 16px 0;
}
#topbar h1 { font-size:15px; font-weight:700; padding:10px 0 0; color:var(--text); }
#daynav {
  display:flex; gap:6px; padding:10px 0 10px;
  overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
#daynav::-webkit-scrollbar { display:none; }
.dnbtn {
  flex-shrink:0; padding:7px 13px; border-radius:20px;
  border:1.5px solid var(--border); background:#fff;
  font-size:13px; font-weight:500; cursor:pointer; color:var(--muted);
  white-space:nowrap; min-height:36px;
}
.dnbtn.active { color:#fff; border-color:transparent; }
.dnbtn[data-base="sf"].active  { background:var(--sf); }
.dnbtn[data-base="al"].active  { background:var(--al); }
.dnbtn[data-base="la"].active  { background:var(--la); }
.dnbtn[data-base="yo"].active  { background:var(--yo); }
.dnbtn[data-base="fly"].active { background:var(--fly); }

/* ── PDF BAR ── */
#pdfbar {
  display:flex; gap:8px; align-items:center;
  padding:8px 16px; background:#fff;
  border-bottom:1px solid var(--border); flex-wrap:wrap;
}
#pdfbar span { font-size:12px; color:var(--muted); }
.pdf-btn {
  padding:6px 14px; border-radius:8px; border:1.5px solid var(--border);
  background:#fff; font-size:13px; cursor:pointer; font-weight:500;
  color:var(--text); min-height:36px;
}
.pdf-btn.primary { background:#1a1a18; color:#fff; border-color:#1a1a18; }

/* ── MAIN SCROLL AREA ── */
#content { padding:16px 16px 100px; overflow-y:auto; }

/* ── MAP TOGGLE ── */
#map-toggle-bar {
  position:fixed; bottom: calc(16px + env(safe-area-inset-bottom, 0px));
  left:50%; transform:translateX(-50%);
  z-index:300;
}
#map-toggle-btn {
  display:flex; align-items:center; gap:6px;
  background:#1a1a18; color:#fff;
  border:none; border-radius:24px;
  padding:10px 20px; font-size:14px; font-weight:600;
  cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,.3);
  white-space:nowrap; min-height:44px;
}

/* ── MAP SHEET ── */
#map-sheet {
  position:fixed; inset:0; z-index:400;
  display:flex; flex-direction:column;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#map-sheet.open { transform:translateY(0); }
#map-header {
  background:#fff; padding:12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
#map-header h3 { font-size:15px; font-weight:600; }
#map-close {
  width:32px; height:32px; border-radius:50%;
  background:var(--bg); border:none; cursor:pointer;
  font-size:18px; display:flex; align-items:center; justify-content:center;
}
#map { flex:1; width:100%; }

/* ── DAY PANEL ── */
.day-panel { display:none; }
.day-panel.active { display:block; }

.day-header {
  display:flex; align-items:flex-start; gap:10px;
  margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--border);
}
.day-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.day-header h2 { font-size:18px; font-weight:700; line-height:1.3; }
.day-header .date { font-size:13px; color:var(--muted); margin-top:2px; }
.base-badge {
  font-size:11px; font-weight:600; padding:4px 10px;
  border-radius:10px; color:#fff; white-space:nowrap;
  margin-left:auto; flex-shrink:0;
}

/* ── TIMELINE ── */
.tl { position:relative; padding-left:26px; margin-bottom:20px; }
.tl::before { content:''; position:absolute; left:7px; top:8px; bottom:0; width:1.5px; background:var(--border); }
.tl-item { position:relative; margin-bottom:16px; }
.tl-dot { position:absolute; left:-21px; top:5px; width:10px; height:10px; border-radius:50%; background:var(--border); border:2px solid var(--bg); }
.tl-time { font-size:12px; color:var(--muted); margin-bottom:2px; }
.tl-title { font-size:14px; font-weight:600; margin-bottom:4px; }
.tl-body { font-size:14px; color:var(--muted); line-height:1.65; }
.tl-drive {
  display:inline-flex; align-items:center; gap:4px;
  font-size:12px; color:var(--muted); background:var(--bg);
  padding:3px 8px; border-radius:6px; margin-top:5px;
}

/* ── FOOD ── */
.food-section { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
.food-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; }
.food-card h4 { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:10px; }
.restaurant { margin-bottom:10px; }
.restaurant:last-child { margin-bottom:0; }
.rest-name { font-size:14px; font-weight:600; }
.rest-desc { font-size:13px; color:var(--muted); line-height:1.5; margin-top:1px; }
.rest-link {
  display:inline-block; font-size:12px; color:var(--sf);
  text-decoration:none; margin-top:4px;
  padding:3px 0; min-height:28px; /* touch target */
}

/* ── NOTES ── */
.note-box {
  background:#fafafa; border:1px solid var(--border);
  border-left:3px solid; border-radius:var(--radius);
  padding:12px 14px; margin-bottom:12px;
  font-size:13px; color:var(--muted); line-height:1.65;
}
.note-box.warn { border-left-color:#ba7517; }
.note-box.info { border-left-color:var(--sf); }
.note-box.tip  { border-left-color:var(--al); }

/* ── RESERVAS ── */
.reservas-wrap { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:16px; }
.conf-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:12px; font-weight:500; padding:4px 9px;
  border-radius:6px; background:#eaf3de; color:#3b6d11;
}
.pend-badge { background:#faeeda; color:#854f0b; }

.section-title {
  font-size:11px; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:.6px; margin:16px 0 8px;
}
</style>
</head>

const nav = document.getElementById('daynav');
const content = document.getElementById('content');

DAYS.forEach((d,i) => {
  const btn = document.createElement('button');
  btn.className = 'dnbtn' + (i===0?' active':'');
  btn.dataset.base = d.base;
  btn.dataset.idx = i;
  btn.innerHTML = `<strong>${d.label}</strong> <span style="font-weight:400"> ${d.sublabel}</span>`;
  btn.onclick = () => showDay(i);
  nav.appendChild(btn);
});

// ── BUILD PANELS ──
DAYS.forEach((d,i) => {
  const panel = document.createElement('div');
  panel.className = 'day-panel' + (i===0?' active':'');
  panel.id = 'panel-'+i;
  const col = BASE_COLORS[d.base] || '#888';

  let html = `
  <div class="day-header">
    <div class="day-dot" style="background:${col}"></div>
    <div style="flex:1;min-width:0">
      <h2>${d.title}</h2>
      <div class="date">${d.sublabel} · 🏠 ${d.night}</div>
    </div>
    <span class="base-badge" style="background:${col}">${d.baseLabel}</span>
  </div>`;

  if(d.reservas?.length){
    html += `<div class="section-title">Reservas del día</div><div class="reservas-wrap">`;
    d.reservas.forEach(r => html += `<span class="conf-badge ${r.ok?'':'pend-badge'}">${r.text}</span>`);
    html += `</div>`;
  }

  d.notes?.forEach(n => html += `<div class="note-box ${n.type}">${n.text}</div>`);

  html += `<div class="section-title">Programa del día</div><div class="tl">`;
  d.timeline.forEach(t => {
    html += `<div class="tl-item">
      <div class="tl-dot" style="background:${col}"></div>
      <div class="tl-time">${t.time}</div>
      <div class="tl-title">${t.title}</div>
      <div class="tl-body">${t.body}</div>
      ${t.drive?`<div class="tl-drive">🚗 ${t.drive}</div>`:''}
    </div>`;
  });
  html += `</div>`;

  html += `<div class="section-title">Dónde comer</div><div class="food-section">`;
  html += `<div class="food-card"><h4>🍽 Comida</h4>`;
  d.lunch.forEach(r => html += `<div class="restaurant">
    <div class="rest-name">${r.name}</div>
    <div class="rest-desc">${r.desc}</div>
    ${r.url?`<a class="rest-link" href="${r.url}" target="_blank">Reservar / Ver →</a>`:''}
  </div>`);
  html += `</div>`;
  html += `<div class="food-card"><h4>🌙 Cena</h4>`;
  d.dinner.forEach(r => html += `<div class="restaurant">
    <div class="rest-name">${r.name}</div>
    <div class="rest-desc">${r.desc}</div>
    ${r.url?`<a class="rest-link" href="${r.url}" target="_blank">Reservar / Ver →</a>`:''}
  </div>`);
  html += `</div></div>`;

  panel.innerHTML = html;
  content.appendChild(panel);
});

// ── MAP ──
let mapInit = false, markers = [];
const mapSheet = document.getElementById('map-sheet');

function initMap(){
  if(mapInit) return;
  mapInit = true;
  window._map = L.map('map').setView([37.5,-119.5],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap', maxZoom:18
  }).addTo(window._map);
}

function loadMapDay(idx){
  initMap();
  markers.forEach(m => window._map.removeLayer(m));
  markers = [];
  const d = DAYS[idx], bounds = [];
  d.pois.forEach(p => {
    const icon = L.divIcon({
      className:'',
      html:`<div style="background:${p.color};width:14px;height:14px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.35)"></div>`,
      iconSize:[14,14], iconAnchor:[7,7]
    });
    const m = L.marker([p.lat,p.lng],{icon}).addTo(window._map);
    m.bindPopup(`<strong>${p.name}</strong>`);
    markers.push(m); bounds.push([p.lat,p.lng]);
  });
  if(bounds.length>1) window._map.fitBounds(bounds,{padding:[30,30]});
  else if(bounds.length===1) window._map.setView(bounds[0],12);
  setTimeout(()=>window._map.invalidateSize(),300);
  document.getElementById('map-title').textContent = `Mapa — ${d.label}: ${d.sublabel}`;
}

function toggleMap(){
  const open = mapSheet.classList.toggle('open');
  document.getElementById('map-toggle-btn').textContent = open ? '✕ Cerrar mapa' : '🗺 Ver mapa del día';
  if(open){
    const idx = [...document.querySelectorAll('.dnbtn')].findIndex(b=>b.classList.contains('active'));
    loadMapDay(idx);
  }
}

function showDay(idx){
  document.querySelectorAll('.dnbtn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.day-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.getElementById('pdf-day-btn').textContent = `📄 Día ${idx+1}`;
  content.scrollTo({top:0, behavior:'smooth'});
  // Scroll nav button into view
  document.querySelectorAll('.dnbtn')[idx].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  if(mapSheet.classList.contains('open')) loadMapDay(idx);
}

// ── PDF ──
function exportPDF(mode){
  const activeIdx = [...document.querySelectorAll('.dnbtn')].findIndex(b=>b.classList.contains('active'));
  let el;
  if(mode==='all'){
    const wrap = document.createElement('div');
    wrap.style.cssText = 'font-family:system-ui,sans-serif;font-size:13px;color:#1a1a18;';
    const t = document.createElement('h1');
    t.textContent = '🌴 California Road Trip — Agosto 2026';
    t.style.cssText = 'font-size:20px;margin-bottom:24px;';
    wrap.appendChild(t);
    document.querySelectorAll('.day-panel').forEach(p=>{
      const c = p.cloneNode(true);
      c.style.display='block'; c.style.marginBottom='40px'; c.style.pageBreakAfter='always';
      wrap.appendChild(c);
    });
    el = wrap;
  } else {
    const d = DAYS[activeIdx];
    const wrap = document.createElement('div');
    wrap.style.cssText = 'font-family:system-ui,sans-serif;font-size:13px;color:#1a1a18;';
    const t = document.createElement('h2');
    t.textContent = `${d.label} — ${d.sublabel}: ${d.title}`;
    t.style.marginBottom='16px';
    wrap.appendChild(t);
    const c = document.getElementById('panel-'+activeIdx).cloneNode(true);
    c.style.display='block'; wrap.appendChild(c);
    el = wrap;
  }
  html2pdf().set({
    margin:12,
    filename: mode==='all' ? 'California_Roadtrip_2026.pdf' : `California_Dia${activeIdx+1}.pdf`,
    html2canvas:{scale:2},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(el).save();
}

showDay(0);

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW no registrado:', err));
  });
}
